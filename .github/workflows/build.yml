name: Build

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v5
      - uses: flatt-security/setup-takumi-guard-npm@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run compile
      - run: pnpm exec tsc --noEmit
      - run: |
          test -f out/extension.js || (echo "extension.js not found" && exit 1)
          test -f out/magoRunner.js || (echo "magoRunner.js not found" && exit 1)
          test -f out/magoOutputParser.js || (echo "magoOutputParser.js not found" && exit 1)
      - run: pnpm run package
      - if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: "*.vsix"
          retention-days: 7
